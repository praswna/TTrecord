<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#185FA5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="탁구기록" />
    <link rel="manifest" href="/TTrecord/manifest.json" />
    <link rel="apple-touch-icon" href="/TTrecord/icon-192.png" />
    <title>탁구기록 TTrecord</title>
    <style>
    html, body {
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
      overscroll-behavior: none;
      touch-action: none;
    }
    #root {
      overflow-y: auto;
      height: 100%;
      -webkit-overflow-scrolling: touch;
    }
  </style>
  <script type="module" crossorigin src="/TTrecord/assets/index-BACbJyyf.js"></script>
  <link rel="stylesheet" crossorigin href="/TTrecord/assets/index-7KtdwCRX.css">
</head>
  <body>
    <div id="root"></div>
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/TTrecord/sw.js')
        .then(reg => {
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'activated') window.location.reload()
            })
          })
        })
    }
  </script>
</body>
</html>
